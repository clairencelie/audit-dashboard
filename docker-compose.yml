version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: audit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-audit_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-audit_pass}
      POSTGRES_DB: ${POSTGRES_DB:-audit_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-audit_user} -d ${POSTGRES_DB:-audit_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: audit_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: ${APP_PORT:-8090}
      DATABASE_URL: postgres://${POSTGRES_USER:-audit_user}:${POSTGRES_PASSWORD:-audit_pass}@postgres:5432/${POSTGRES_DB:-audit_db}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-super-secret-refresh-key-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8090:8090"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8090/api/v1}
    container_name: audit_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: audit_pgadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@audit.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  uploads_data:
